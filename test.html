<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAM3 Mask Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .controls label { font-size: 0.9rem; }
  .controls input, .controls button, .controls select {
    padding: 6px 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; font-size: 0.9rem;
  }
  button { cursor: pointer; }
  button:hover { background: #333; }
  button#run { background: #2563eb; border-color: #2563eb; font-weight: 600; }
  button#run:hover { background: #1d4ed8; }
  button#run:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { font-size: 0.85rem; color: #aaa; min-height: 1.2em; margin-bottom: 12px; }
  #status.error { color: #f87171; }
  .canvas-wrap { position: relative; display: inline-block; background: #000; border-radius: 8px; overflow: hidden; }
  canvas { display: block; }
  #overlay { position: absolute; top: 0; left: 0; }
  .masks-info { margin-top: 16px; }
  .mask-chip {
    display: inline-block; padding: 4px 10px; border-radius: 4px; margin: 4px; font-size: 0.85rem; cursor: pointer;
    border: 2px solid transparent;
  }
  .mask-chip.active { border-color: #fff; }
  .prompt-info { font-size: 0.8rem; color: #888; margin-top: 4px; }
  #textPrompt { width: 200px; }
  .text-row { display: none; gap: 8px; align-items: center; }
  .text-row.visible { display: flex; }
</style>
</head>
<body>
<h1>SAM3 Segmentation Viewer</h1>

<div class="controls">
  <label>Image: <input type="file" id="fileInput" accept="image/*"></label>
  <label>Prompt:
    <select id="promptType">
      <option value="text">Text</option>
      <option value="box">Drag box</option>
      <option value="point">Click point</option>
    </select>
  </label>
  <label>Output:
    <select id="outputMode">
      <option value="masks">Masks</option>
      <option value="points">Points</option>
    </select>
  </label>
  <label>Max: <input type="number" id="maxMasks" value="3" min="1" max="5" style="width:50px"></label>
  <button id="run" disabled>Segment</button>
</div>
<div class="text-row visible" id="textRow">
  <label>Describe object: <input type="text" id="textPrompt" placeholder="e.g. cat, person, shoe"></label>
</div>
<div class="prompt-info" id="promptInfo">Load an image and type what to segment.</div>
<div id="status"></div>

<div class="canvas-wrap">
  <canvas id="base"></canvas>
  <canvas id="overlay"></canvas>
</div>

<div class="masks-info" id="masksInfo"></div>

<script>
const COLORS = [
  [59, 130, 246, 0.45],
  [245, 158, 11, 0.45],
  [16, 185, 129, 0.45],
  [239, 68, 68, 0.45],
  [168, 85, 247, 0.45],
];

const API = `${window.location.origin}/v1/sam/segment`;

let imgEl = null;
let imgBase64 = null;
let point = null;
let box = null;
let dragStart = null;
let masks = [];
let points = [];
let activeMask = new Set();
let scaleX = 1, scaleY = 1;

const baseCanvas = document.getElementById('base');
const overlayCanvas = document.getElementById('overlay');
const baseCtx = baseCanvas.getContext('2d');
const overlayCtx = overlayCanvas.getContext('2d');
const statusEl = document.getElementById('status');
const masksInfoEl = document.getElementById('masksInfo');
const runBtn = document.getElementById('run');
const promptType = document.getElementById('promptType');
const textRow = document.getElementById('textRow');
const textPrompt = document.getElementById('textPrompt');
const promptInfo = document.getElementById('promptInfo');

promptType.addEventListener('change', () => {
  const v = promptType.value;
  textRow.classList.toggle('visible', v === 'text');
  if (v === 'text') promptInfo.textContent = 'Load an image and type what to segment.';
  else if (v === 'box') promptInfo.textContent = 'Load an image, then drag a box on it.';
  else promptInfo.textContent = 'Load an image, then click to place a point.';
  point = null; box = null;
  updateRunBtn();
});

function updateRunBtn() {
  const v = promptType.value;
  if (!imgBase64) { runBtn.disabled = true; return; }
  if (v === 'text') runBtn.disabled = !textPrompt.value.trim();
  else if (v === 'box') runBtn.disabled = !box;
  else runBtn.disabled = !point;
}

textPrompt.addEventListener('input', updateRunBtn);

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imgBase64 = ev.target.result.split(',')[1];
    const img = new Image();
    img.onload = () => {
      imgEl = img;
      const maxW = Math.min(img.width, 900);
      const scale = maxW / img.width;
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      baseCanvas.width = overlayCanvas.width = w;
      baseCanvas.height = overlayCanvas.height = h;
      scaleX = img.width / w;
      scaleY = img.height / h;
      baseCtx.drawImage(img, 0, 0, w, h);
      point = null; box = null; masks = []; points = []; activeMask.clear();
      overlayCtx.clearRect(0, 0, w, h);
      masksInfoEl.innerHTML = '';
      status('Image loaded.');
      updateRunBtn();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

overlayCanvas.addEventListener('mousedown', e => {
  if (!imgEl) return;
  const r = overlayCanvas.getBoundingClientRect();
  const cx = e.clientX - r.left;
  const cy = e.clientY - r.top;
  if (promptType.value === 'box') {
    dragStart = { x: cx, y: cy };
  } else if (promptType.value === 'point') {
    point = { x: Math.round(cx * scaleX), y: Math.round(cy * scaleY) };
    box = null;
    drawPrompt();
    updateRunBtn();
    status(`Point set at (${point.x}, ${point.y})`);
  }
});

overlayCanvas.addEventListener('mousemove', e => {
  if (!dragStart) return;
  const r = overlayCanvas.getBoundingClientRect();
  const cx = e.clientX - r.left;
  const cy = e.clientY - r.top;
  drawPrompt({ x1: dragStart.x, y1: dragStart.y, x2: cx, y2: cy });
});

overlayCanvas.addEventListener('mouseup', e => {
  if (!dragStart) return;
  const r = overlayCanvas.getBoundingClientRect();
  const cx = e.clientX - r.left;
  const cy = e.clientY - r.top;
  box = {
    x1: Math.round(Math.min(dragStart.x, cx) * scaleX),
    y1: Math.round(Math.min(dragStart.y, cy) * scaleY),
    x2: Math.round(Math.max(dragStart.x, cx) * scaleX),
    y2: Math.round(Math.max(dragStart.y, cy) * scaleY),
  };
  point = null;
  dragStart = null;
  drawPrompt();
  updateRunBtn();
  status(`Box set: (${box.x1},${box.y1}) to (${box.x2},${box.y2})`);
});

function drawPrompt(tempBox) {
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  for (const idx of activeMask) drawMask(idx);

  if (point) {
    overlayCtx.beginPath();
    overlayCtx.arc(point.x / scaleX, point.y / scaleY, 6, 0, Math.PI * 2);
    overlayCtx.fillStyle = '#f00';
    overlayCtx.fill();
    overlayCtx.strokeStyle = '#fff';
    overlayCtx.lineWidth = 2;
    overlayCtx.stroke();
  }
  const b = tempBox || (box ? {
    x1: box.x1 / scaleX, y1: box.y1 / scaleY,
    x2: box.x2 / scaleX, y2: box.y2 / scaleY
  } : null);
  if (b) {
    overlayCtx.strokeStyle = '#0f0';
    overlayCtx.lineWidth = 2;
    overlayCtx.setLineDash([6, 3]);
    overlayCtx.strokeRect(b.x1, b.y1, b.x2 - b.x1, b.y2 - b.y1);
    overlayCtx.setLineDash([]);
  }
}

runBtn.addEventListener('click', async () => {
  if (!imgBase64) return;
  runBtn.disabled = true;
  status('Running segmentation\u2026');

  const prompt = {};
  const ptype = promptType.value;
  if (ptype === 'text') prompt.text = textPrompt.value.trim();
  else if (ptype === 'point') prompt.points = [{ x: point.x, y: point.y, label: 1 }];
  else if (ptype === 'box') prompt.box = box;

  const outputMode = document.getElementById('outputMode').value;
  const body = {
    image: imgBase64,
    prompt,
    multimask_output: true,
    max_masks: parseInt(document.getElementById('maxMasks').value) || 3,
    output: outputMode,
  };

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.error) {
      status(`Error: ${data.error.code} \u2014 ${data.error.message}`, true);
      runBtn.disabled = false;
      return;
    }
    if (data.points) {
      points = data.points;
      masks = [];
      activeMask.clear();
      renderPoints();
      status(`Got ${points.length} point(s). Best confidence: ${points[0]?.confidence}`);
    } else {
      masks = data.masks || [];
      points = [];
      activeMask.clear();
      if (masks.length > 0) activeMask.add(0);
      renderMasks();
      status(`Got ${masks.length} mask(s). Best confidence: ${masks[0]?.confidence}`);
    }
  } catch (err) {
    status(`Fetch error: ${err.message}`, true);
  }
  runBtn.disabled = false;
});

function decodeRLE(rle) {
  const [h, w] = rle.size;
  const counts = rle.counts;
  const mask = new Uint8Array(h * w);

  // COCO RLE string decoding (matches pycocotools maskApi.c)
  const cnts = [];
  let p = 0;
  while (p < counts.length) {
    let x = 0, k = 0, more = true;
    while (more) {
      const c = counts.charCodeAt(p) - 48;
      x |= (c & 0x1f) << (5 * k);
      more = (c & 0x20) !== 0;
      p++;
      k++;
      if (!more && (c & 0x10)) {
        // Sign extend: set all upper bits to 1
        if (5 * k < 32) x |= (~0) << (5 * k);
      }
    }
    // Delta decode from 2 positions back (starts at 4th element, matching maskApi.c m>2)
    if (cnts.length > 2) x += cnts[cnts.length - 2];
    cnts.push(x);
  }

  let pos = 0;
  for (let i = 0; i < cnts.length; i++) {
    const val = (i % 2 === 0) ? 0 : 1;
    const run = cnts[i];
    if (val === 1) {
      const end = Math.min(pos + run, mask.length);
      for (let j = pos; j < end; j++) mask[j] = 1;
    }
    pos += run;
  }
  return { data: mask, h, w };
}

function drawMask(idx) {
  const m = masks[idx];
  if (!m) return;
  const { data, h, w } = decodeRLE(m.mask_rle);
  const [r, g, b, a] = COLORS[idx % COLORS.length];

  const imgData = overlayCtx.createImageData(overlayCanvas.width, overlayCanvas.height);
  const dispW = overlayCanvas.width;
  const dispH = overlayCanvas.height;

  for (let dy = 0; dy < dispH; dy++) {
    for (let dx = 0; dx < dispW; dx++) {
      // COCO RLE is column-major: index = x * h + y
      const mx = Math.round(dx * scaleX);
      const my = Math.round(dy * scaleY);
      if (mx < w && my < h) {
        const mi = mx * h + my;
        if (data[mi]) {
          const pi = (dy * dispW + dx) * 4;
          imgData.data[pi] = r;
          imgData.data[pi + 1] = g;
          imgData.data[pi + 2] = b;
          imgData.data[pi + 3] = Math.round(a * 255);
        }
      }
    }
  }
  overlayCtx.putImageData(imgData, 0, 0);
}

function renderMasks() {
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  for (const idx of activeMask) drawMask(idx);
  drawPrompt();

  masksInfoEl.innerHTML = '';
  masks.forEach((m, i) => {
    const [r, g, b] = COLORS[i % COLORS.length];
    const chip = document.createElement('span');
    chip.className = 'mask-chip' + (activeMask.has(i) ? ' active' : '');
    chip.style.background = `rgba(${r},${g},${b},0.3)`;
    chip.textContent = `Mask ${m.id} \u2014 ${(m.confidence * 100).toFixed(1)}%`;
    chip.onclick = () => {
      if (activeMask.has(i)) activeMask.delete(i);
      else activeMask.add(i);
      renderMasks();
    };
    masksInfoEl.appendChild(chip);
  });
}

function drawCentroid(idx) {
  const p = points[idx];
  if (!p) return;
  const [r, g, b] = COLORS[idx % COLORS.length];
  const cx = p.point.x / scaleX;
  const cy = p.point.y / scaleY;
  const sz = 12;

  overlayCtx.strokeStyle = `rgb(${r},${g},${b})`;
  overlayCtx.lineWidth = 3;
  overlayCtx.lineCap = 'round';
  overlayCtx.beginPath();
  overlayCtx.moveTo(cx - sz, cy - sz);
  overlayCtx.lineTo(cx + sz, cy + sz);
  overlayCtx.moveTo(cx + sz, cy - sz);
  overlayCtx.lineTo(cx - sz, cy + sz);
  overlayCtx.stroke();
}

function renderPoints() {
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  points.forEach((_, i) => drawCentroid(i));
  drawPrompt();

  masksInfoEl.innerHTML = '';
  points.forEach((p, i) => {
    const [r, g, b] = COLORS[i % COLORS.length];
    const chip = document.createElement('span');
    chip.className = 'mask-chip active';
    chip.style.background = `rgba(${r},${g},${b},0.3)`;
    chip.textContent = `Point ${p.id} \u2014 ${(p.confidence * 100).toFixed(1)}% (${Math.round(p.point.x)}, ${Math.round(p.point.y)})`;
    masksInfoEl.appendChild(chip);
  });
}

function status(msg, isError) {
  statusEl.textContent = msg;
  statusEl.className = isError ? 'error' : '';
}
</script>
</body>
</html>
